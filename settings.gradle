pluginManagement {
    repositories {
        maven { url = 'https://maven.fabricmc.net/' }
        gradlePluginPortal()
        mavenCentral()
    }
}

dependencyResolutionManagement {
    // Fabric Loom adds its own local remapped-mod repository at project level.
    // FAIL_ON_PROJECT_REPOS breaks Loom, so WARN keeps dependency resolution safe
    // while allowing Loom's generated local repository.
    repositoriesMode.set(RepositoriesMode.WARN)
    repositories {
        maven { url = 'https://maven.fabricmc.net/' }
        mavenCentral()
    }
}

rootProject.name = 'hardest-hide-and-seek'
